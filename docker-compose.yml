services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_saas
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d secure_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
